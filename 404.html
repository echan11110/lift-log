<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Lift Log</title>
  <script>
    // SPA redirect for GitHub Pages
    // Encodes the current path into a query string so index.html can restore it
    var segmentsToKeep = 1; // keep '/lift-log' as the base segment
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
